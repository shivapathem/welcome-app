
name: 🚀 CI-CD IIS Deployment Pipeline
 
on:
  push:
    branches:
      - CICD
 
jobs:
  build:
    name: 🏗️ Build Website Artifact
    runs-on: self-hosted
 
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
 
      - name: 📂 Create Artifact Folder
        run: |
          mkdir artifact
          copy index.html artifact\
        shell: cmd
 
      - name: 📋 Show Artifact Files
        run: dir artifact
        shell: cmd
 
      - name: 📦 Upload Website Artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-artifact
          path: artifact\
          retention-days: 7
 
  deploy:
    name: 🚀 Deploy Artifact to IIS
    runs-on: self-hosted
    needs: build
 
    steps:
      - name: 📥 Download Website Artifact
        uses: actions/download-artifact@v4
        with:
          name: website-artifact
          path: downloaded-artifact
 
      - name: 📂 Show Downloaded Files
        run: dir downloaded-artifact
        shell: cmd
 
      - name: 🛑 Stop IIS Website
        run: |
          Import-Module WebAdministration
          Stop-Website -Name "Default Web Site"
        shell: powershell
        continue-on-error: true
 
      - name: 🧹 Clean Existing IIS Content
        run: |
          Remove-Item -Path "C:\inetpub\wwwroot\*" -Recurse -Force
        shell: powershell
 
      - name: 📁 Copy Artifact to IIS Folder
        run: |
          Copy-Item -Path "downloaded-artifact\*" -Destination "C:\inetpub\wwwroot\" -Recurse -Force
        shell: powershell
 
      - name: ▶️ Start IIS Website
        run: |
          Import-Module WebAdministration
          Start-Website -Name "Default Web Site"
        shell: powershell
 
  validate:
    name: ✅ Validate IIS Deployment
    runs-on: self-hosted
    needs: deploy
 
    steps:
      - name: 🌐 Verify Website Response
        run: |
          $response = Invoke-WebRequest -Uri "http://localhost" -UseBasicParsing
          Write-Host "Status Code:" $response.StatusCode
        shell: powershell
 
      - name: 📋 Display IIS Website Status
        run: |
          Import-Module WebAdministration
          Get-Website
        shell: powershell
``
