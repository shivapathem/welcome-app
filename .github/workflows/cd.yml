
name: 🌐 IIS Deployment Pipeline
 
on:
  push:
    branches:
      - IIS
 
jobs:
  build:
    name: 🏗️ Prepare Website Files
    runs-on: self-hosted
 
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
 
      - name: 📂 Verify Files
        run: dir
        shell: cmd
 
  deploy:
    name: 🚀 Deploy to IIS
    runs-on: self-hosted
    needs: build
 
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
 
      - name: 🛑 Stop IIS Website
        run: |
          Import-Module WebAdministration
          Stop-Website -Name "Default Web Site"
        shell: powershell
        continue-on-error: true
 
      - name: 🧹 Clean Existing IIS Files
        run: |
          Remove-Item -Path "C:\inetpub\wwwroot\*" -Recurse -Force
        shell: powershell
 
      - name: 📁 Copy New Website Files
        run: |
          Copy-Item -Path "${{ github.workspace }}\index.html" -Destination "C:\inetpub\wwwroot\" -Force
        shell: powershell
 
      - name: ▶️ Start IIS Website
        run: |
          Import-Module WebAdministration
          Start-Website -Name "Default Web Site"
        shell: powershell
 
  validate:
    name: ✅ Validate IIS Deployment
    runs-on: self-hosted
    needs: deploy
 
    steps:
      - name: 🌐 Check Website Response
        run: |
          Invoke-WebRequest -Uri "http://localhost" -UseBasicParsing | Select-Object StatusCode
        shell: powershell
 
      - name: 📋 Show IIS Website Status
        run: |
          Import-Module WebAdministration
          Get-Website
        shell: powershell
