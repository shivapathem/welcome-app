name: 🚀 Welcome App Deployment Pipeline
 
on:
  push:
    branches:
      - main
 
jobs:
  build:
    name: 🏗️ Build Application
    runs-on: self-hosted
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
 
      - name: 🐳 Build Docker Image
        run: docker build -t welcome-app:latest .
 
  test:
    name: 🧪 Test Environment
    runs-on: self-hosted
    needs: build
    steps:
      - name: 🔍 Verify Docker
        run: docker info
 
      - name: 📦 Check Images
        run: docker images
 
  deploy:
    name: 🚀 Deploy Application
    runs-on: self-hosted
    needs: test
    steps:
      - name: 🛑 Stop Old Container
        run: |
          docker stop welcome-app || exit 0
          docker rm welcome-app || exit 0
        shell: cmd
 
      - name: ▶️ Run New Container
        run: docker run -d -p 8080:80 --name welcome-app welcome-app:latest
 
  validate:
    name: ✅ Validate Deployment
    runs-on: self-hosted
    needs: deploy
    steps:
      - name: 📋 Check Running Container
        run: docker ps
 
      - name: 📜 View Logs
        run: docker logs welcome-app
