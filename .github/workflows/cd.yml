name: CD Pipeline - Welcome App
 
on:
  push:
    branches:
      - main
 
jobs:
  deploy:
    runs-on: self-hosted
 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
 
      - name: Build Docker Image
        run: docker build -t welcome-app:latest .
 
      - name: Stop Old Container
        run: |
          docker stop welcome-app || exit 0
          docker rm welcome-app || exit 0
        shell: cmd
 
      - name: Run New Container
        run: docker run -d -p 8080:80 --name welcome-app welcome-app:latest
 
